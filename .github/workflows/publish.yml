name: Publish packages to npm

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify release candidate
        run: pnpm release:check

      - name: Publish @openclawbrain/contracts
        run: cd packages/contracts && npm publish --access public --provenance

      - name: Publish @openclawbrain/pack-format
        run: cd packages/pack-format && npm publish --access public --provenance

      - name: Publish @openclawbrain/compiler
        run: cd packages/compiler && npm publish --access public --provenance

      - name: Publish @openclawbrain/learner
        run: cd packages/learner && npm publish --access public --provenance
